<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyan Chaupar - The Pursuit of Moksha</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cinzel:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <div id="particle-container"></div>
    <div class="main-container glass-panel">
        <header>
            <h1>GYAN CHAUPAR</h1>
            <p class="subtitle">The Journey to Liberation</p>
        </header>

        <div class="game-layout">
            <div class="board-column">
                <div id="game-board" class="board glass-panel">
                    <!-- Grid generated by JS -->
                    <div id="player" class="player-token"></div>
                </div>
            </div>

            <div class="controls-column">
                <div class="status-panel glass-panel">
                    <h2>Game Status</h2>
                    <div class="stat-row">
                        <span>Position:</span>
                        <span id="pos-display" class="highlight">1</span>
                    </div>
                    <div class="stat-row">
                        <span>Stage:</span>
                        <span id="stage-display" class="highlight">Mithyatva</span>
                    </div>
                </div>

                <div class="dice-panel glass-panel">
                    <div id="dice" class="dice">⚀</div>
                    <button id="roll-btn" class="glow-btn">Roll Dice</button>
                    <div id="action-text" class="action-feedback">Awaiting roll...</div>
                </div>

                <div class="info-panel glass-panel mt-auto">
                    <h3>Karma Meter</h3>
                    <div class="progress-bar">
                        <div id="karma-fill" class="progress-fill"></div>
                    </div>
                    <p class="small-text">Virtues reduce your karma, Vices increase it.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Educational Modal -->
    <div id="event-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2 id="modal-title">Concept</h2>
            <div id="modal-icon" class="modal-icon">🪜</div>
            <p id="modal-desc">Description of the concept goes here.</p>
            <button id="modal-close" class="glow-btn">Acknowledge</button>
        </div>
    </div>

    <script src="static/js/script.js"></script>
</body>
</html>
