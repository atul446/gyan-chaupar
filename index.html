<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyan Chaupar - The Pursuit of Moksha</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&family=Noto+Serif:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!-- Start Game Modal -->
    <div id="start-modal" class="modal">
        <div class="modal-content glass-panel" style="max-width: 600px;">
            <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Assemble Seekers</h2>
            <p style="margin-bottom: 2rem; color: var(--text-secondary);">Select the souls embarking on the journey to Moksha (Max 4).</p>
            
            <div id="avatar-selection" style="display: flex; justify-content: space-around; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap;">
                <!-- Avatars rendered by JS -->
            </div>
            
            <button id="begin-journey-btn" class="glow-btn" disabled>Begin Journey</button>
        </div>
    </div>

    <div id="particle-container"></div>
    <div class="main-container glass-panel" id="main-ui" style="opacity: 0; pointer-events: none; transition: opacity 0.5s ease;">
        <header>
            <h1>GYAN CHAUPAR</h1>
            <p class="subtitle">The Journey to Liberation</p>
        </header>

        <div class="game-layout">
            <div class="board-column">
                <div id="game-board" class="board glass-panel">
                    <svg id="connections" viewBox="0 0 100 100" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:5;"></svg>
                    <!-- Grid generated by JS -->
                    <!-- Player tokens generated by JS -->
                </div>
            </div>

            <div class="controls-column">
                <div class="status-panel glass-panel" id="player-status-panel">
                    <h2 id="active-player-name">Player 1's Turn</h2>
                    <div class="stat-row">
                        <span>Position:</span>
                        <span id="pos-display" class="highlight">1</span>
                    </div>
                    <div class="stat-row">
                        <span>Stage:</span>
                        <span id="stage-display" class="highlight">Mithyatva</span>
                    </div>
                </div>

                <div class="dice-panel glass-panel">
                    <div id="dice" class="dice">⚀</div>
                    <button id="roll-btn" class="glow-btn">Roll Dice</button>
                    <div id="action-text" class="action-feedback">Awaiting roll...</div>
                </div>

                <div class="info-panel glass-panel mt-auto">
                    <h3>Karma Meter</h3>
                    <div class="progress-bar">
                        <div id="karma-fill" class="progress-fill"></div>
                    </div>
                    <p class="small-text">Virtues reduce your karma, Vices increase it.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Educational Modal -->
    <div id="event-modal" class="modal hidden">
        <div class="modal-content glass-panel">
            <h2 id="modal-title">Concept</h2>
            <div id="modal-icon" class="modal-icon">🪜</div>
            <p id="modal-desc">Description of the concept goes here.</p>
            <button id="modal-close" class="glow-btn">Acknowledge</button>
        </div>
    </div>

    <script src="static/js/script.js"></script>
</body>
</html>
